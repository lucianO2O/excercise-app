<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@1.0.4/css/bulma.min.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.3.0/css/all.min.css">
    <title>Home</title>
</head>

<body>
    <nav class="navbar has-background-link-dark" role="navigation" aria-label="main navigation">
        <div class="navbar-brand">
            <a class="navbar-item" href="#">
                <img src="" alt="Logo">
            </a>
            <a role="button" class="navbar-burger" aria-label="menu" aria-expanded="false"
                data-target="navbar-menu">
                <span aria-hidden="true"></span>
                <span aria-hidden="true"></span>
                <span aria-hidden="true"></span>
                <span aria-hidden="true"></span>
            </a>
        </div>

        <div class="navbar-menu">
            <div class="navbar-start">
                <a class="navbar-item has-icons-left is-active">
                    <span class="icon is-small">
                        <i class="fas fa-person-running"></i>
                    </span>
                    Activity
                </a>
            </div>

            <div class="navbar-end">
                <a class="navbar-item">
                    Home
                </a>
                
                <div class="navbar-item has-dropdown is-hoverable">
                    <a class="navbar-link">
                        Registration
                    </a>
                
                    <div class="navbar-dropdown">
                        <a class="navbar-item">
                            Log-in
                        </a>
                        <a class="navbar-item is-selected">
                            Register
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <div class="columns is-centered">
        <div class="column box is-three-quarters mt-6 p-5">
            <div>
                <h1 class="title is-2">Log In</h1>
            </div>
            <br>
            <div class="field pb-3">
                <p class="control has-icons-left has-icons-right">
                    <input class="input" type="email" placeholder="Email" />
                    <span class="icon is-small is-left">
                        <i class="fas fa-envelope"></i>
                    </span>
                    <span class="icon is-small is-right">
                        <i class="fas fa-check"></i>
                    </span>
                </p>
            </div>
            <div class="field pb-3">
                <p class="control has-icons-left has-icons-right">
                    <input class="input" type="password" placeholder="Password" />
                    <span class="icon is-small is-left">
                        <i class="fas fa-lock"></i>
                    </span>
                    <span class="icon is-small is-right">
                        <i class="fas fa-check"></i>
                    </span>
                </p>
            </div>

            <div class="button">

            </div>
        </div>
    </div>
</body>

</html>
